name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -e ".[dev]"
        pip install pytest pytest-cov
    
    - name: Lint with ruff
      run: |
        ruff check arceion/
      continue-on-error: true
    
    - name: Type check with mypy
      run: |
        mypy arceion/ --ignore-missing-imports
      continue-on-error: true
    
    - name: Run tests with pytest
      run: |
        # Check if there are any actual test files (test_*.py or *_tests.py)
        if find arceion/zorion/tests -name "test_*.py" -o -name "*_tests.py" | grep -q .; then
          pytest arceion/zorion/tests/ -v --cov=arceion/zorion --cov-report=xml
        else
          echo "No actual test files found, skipping pytest. (Test utilities are available for user projects)"
        fi
      continue-on-error: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true
